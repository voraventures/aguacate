name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create backend virtualenv
        run: python -m venv backend/.venv

      - name: Install backend requirements
        run: backend/.venv/Scripts/pip install -r backend/requirements.txt

      - name: Install PyInstaller
        run: backend/.venv/Scripts/pip install pyinstaller

      - name: Build backend with PyInstaller
        run: backend/.venv/Scripts/pyinstaller backend/backend.spec --clean --distpath backend/dist --workpath backend/build

      - name: Verify backend executable exists
        shell: pwsh
        run: |
          if (-not (Test-Path "backend/dist/aguacate-backend/aguacate-backend.exe")) {
            Write-Error "Backend executable not found at backend/dist/aguacate-backend/aguacate-backend.exe"
            exit 1
          }
          Write-Host "Backend executable verified."

      - name: Build Windows installer
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
