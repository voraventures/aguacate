<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- Aguacate app icon — premium macOS execution.
       Squircle container on warm off-white #F7F5F0 (flat, no gradient).
       Avocado silhouette is canonical: do not alter the path geometry.
       Depth comes from lighting only: ambient light from upper-left,
       diagonal skin gradient, radial flesh shading, walnut pit with
       specular highlight + ambient occlusion, baked bottom shadow. -->
  <defs>
    <linearGradient id="skin" x1="0.18" y1="0.10" x2="0.84" y2="0.94">
      <stop offset="0" stop-color="#85B260"/>
      <stop offset="1" stop-color="#5A8240"/>
    </linearGradient>
    <radialGradient id="flesh" cx="0.5" cy="0.46" r="0.66">
      <stop offset="0" stop-color="#DEEDBE"/>
      <stop offset="0.68" stop-color="#D4E8B0"/>
      <stop offset="1" stop-color="#CBDFA2"/>
    </radialGradient>
    <radialGradient id="pit" cx="0.36" cy="0.32" r="0.95">
      <stop offset="0" stop-color="#8A5526"/>
      <stop offset="0.55" stop-color="#5C2E0E"/>
      <stop offset="1" stop-color="#411F0A"/>
    </radialGradient>
    <linearGradient id="edgeLight" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.38"/>
      <stop offset="0.55" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft6"><feGaussianBlur stdDeviation="6"/></filter>
    <filter id="soft14"><feGaussianBlur stdDeviation="14"/></filter>
    <filter id="soft20"><feGaussianBlur stdDeviation="20"/></filter>
    <filter id="soft22"><feGaussianBlur stdDeviation="22"/></filter>
    <!-- container elevation: spec dy=4/stdDev=8 scaled 4x to this 1024 canvas -->
    <filter id="elevation" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#1A3020" flood-opacity="0.25"/>
    </filter>
    <clipPath id="squircleClip">
      <rect x="32" y="28" width="960" height="960" rx="240"/>
    </clipPath>
    <clipPath id="rimClip">
      <path d="M 512 198 C 580 198 612 266 638 348 C 666 436 718 492 718 590 C 718 716 626 808 512 808 C 398 808 306 716 306 590 C 306 492 358 436 386 348 C 412 266 444 198 512 198 Z"/>
    </clipPath>
    <clipPath id="fleshClip">
      <path d="M 512 240 C 568 240 594 300 618 372 C 642 450 686 502 686 588 C 686 696 608 774 512 774 C 416 774 338 696 338 588 C 338 502 382 450 406 372 C 430 300 456 240 512 240 Z"/>
    </clipPath>
    <clipPath id="pitClip"><circle cx="512" cy="592" r="118"/></clipPath>
  </defs>

  <!-- container: flat warm off-white squircle, 25% corner radius,
       with a baked drop shadow for visible elevation in the dock -->
  <rect x="32" y="28" width="960" height="960" rx="240" fill="#7CB87A" filter="url(#elevation)"/>
  <rect x="32" y="28" width="960" height="960" rx="240" fill="#7CB87A"/>

  <!-- subtle top-surface light: soft white glow at the top center -->
  <g clip-path="url(#squircleClip)">
    <ellipse cx="512" cy="40" rx="320" ry="80" fill="#FFFFFF" opacity="0.15" filter="url(#soft20)"/>
  </g>

  <!-- avocado skin — muted natural green, lighter upper-left, darker lower-right -->
  <path fill="url(#skin)" d="
    M 512 198
    C 580 198 612 266 638 348
    C 666 436 718 492 718 590
    C 718 716 626 808 512 808
    C 398 808 306 716 306 590
    C 306 492 358 436 386 348
    C 412 266 444 198 512 198 Z"/>

  <!-- delicate highlight along the upper-left skin edge -->
  <g clip-path="url(#rimClip)">
    <path fill="none" stroke="url(#edgeLight)" stroke-width="12" filter="url(#soft6)" d="
      M 512 198
      C 580 198 612 266 638 348
      C 666 436 718 492 718 590
      C 718 716 626 808 512 808
      C 398 808 306 716 306 590
      C 306 492 358 436 386 348
      C 412 266 444 198 512 198 Z"/>
  </g>

  <!-- flesh — creamy light green, soft radial shading -->
  <path fill="url(#flesh)" d="
    M 512 240
    C 568 240 594 300 618 372
    C 642 450 686 502 686 588
    C 686 696 608 774 512 774
    C 416 774 338 696 338 588
    C 338 502 382 450 406 372
    C 430 300 456 240 512 240 Z"/>

  <!-- gentle emboss: soft inner shadow where flesh meets skin -->
  <g clip-path="url(#fleshClip)">
    <path fill="none" stroke="#69904A" stroke-opacity="0.28" stroke-width="22" filter="url(#soft14)" d="
      M 512 240
      C 568 240 594 300 618 372
      C 642 450 686 502 686 588
      C 686 696 608 774 512 774
      C 416 774 338 696 338 588
      C 338 502 382 450 406 372
      C 430 300 456 240 512 240 Z"/>
    <!-- ambient occlusion where the pit sits in the flesh -->
    <ellipse cx="512" cy="602" rx="130" ry="127" fill="#4A6B33" opacity="0.32" filter="url(#soft22)"/>
  </g>

  <!-- pit — walnut brown sphere lit from upper-left -->
  <circle cx="512" cy="592" r="118" fill="url(#pit)"/>
  <g clip-path="url(#pitClip)">
    <ellipse cx="474" cy="550" rx="36" ry="27" transform="rotate(-32 474 550)"
             fill="#F2D7B8" opacity="0.40" filter="url(#soft6)"/>
    <ellipse cx="466" cy="542" rx="15" ry="11" transform="rotate(-32 466 542)"
             fill="#FFF1DE" opacity="0.55" filter="url(#soft6)"/>
    <!-- faint reflected light along the pit's lower edge -->
    <ellipse cx="524" cy="692" rx="72" ry="22" fill="#8A5526" opacity="0.30" filter="url(#soft14)"/>
  </g>
</svg>
